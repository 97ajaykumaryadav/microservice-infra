name: 'Manual Terraform Import'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
      resource_address:
        description: 'Terraform Resource Address (e.g. module.aks.azurerm_kubernetes_cluster.aks["aks-dev-001"])'
        required: true
        default: 'module.aks.azurerm_kubernetes_cluster.aks["aks-dev-001"]'
      azure_resource_id:
        description: 'Azure Resource ID'
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  import:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true

    defaults:
      run:
        working-directory: environments/${{ github.event.inputs.environment }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 'Az Login'
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Import
      run: |
        terraform import '${{ github.event.inputs.resource_address }}' '${{ github.event.inputs.azure_resource_id }}'
